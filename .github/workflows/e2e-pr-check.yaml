name: E2E PR Check - Onboarding Intro

on:
  workflow_dispatch:

jobs:
  e2e-onboarding-intro:
    timeout-minutes: 60
    runs-on: macos-15 
    steps:
      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: 'npm' 

      - name: Setup Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle' 

      - name: Install dependencies
        run: npm ci

      - name: Build project for E2E
        run: |
          export LANG=en_US.UTF-8
          export KERIA_IP=10.0.2.2
          npm run build:e2e

      - name: Build Android APK
        run: |
          cd android
          ./gradlew assembleDebug
          cd ..
          # Dynamically set the APP_PATH for the test runner
          APK_PATH=$(find android/app/build/outputs/apk/debug -name "*.apk" | head -1)
          echo "APP_PATH=$APK_PATH" >> "$GITHUB_ENV"

      - name: Start Appium
        run: |
          npm install -g appium
          appium driver install uiautomator2 || appium driver update uiautomator2
          appium --log-level error & 

      - name: Run onboarding-intro E2E test
        uses: reactivecircus/android-emulator-runner@b530d96654c385303d652368551fb075bc2f0b6b # v2.35.0
        env:
          NODE_OPTIONS: "--max_old_space_size=8192" 
        with:
          api-level: 31 
          target: google_apis
          arch: x86_64
          force-avd-creation: true
          emulator-options: -no-window -no-audio -gpu swiftshader_indirect -no-snapshot -no-boot-anim
          disable-animations: true
          script: |
            # 1. Wait for Appium using the DevOps-preferred health check logic
            for i in {1..20}; do 
              if curl -s http://127.0.0.1:4723/status; then 
                echo "Appium is ready!"
                break 
              fi
              echo "Waiting for Appium... ($i/20)"
              sleep 5
            done
            # 2. Run your specific test scenario
            npm run wdio:android:s24ultra -- --spec ./tests/features/onboarding/onboarding-intro.feature

      - name: Cleanup
        if: always()
        run: |
          pkill -f appium || true
