name: E2E PR Check - Onboarding Intro

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'tests/steps-definitions/onboarding/**'
      - 'tests/features/onboarding/**'
      - 'tests/helpers/**'
      - 'tests/screen-objects/onboarding/**'
      - 'src/ui/pages/**'
      - 'package.json'
      - 'package-lock.json'

jobs:
  e2e-onboarding-intro:
    timeout-minutes: 60
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@cd92f1f64a4a3cfc50b6b4de34e336cd5c5e5f5b # v4.4.0
        with:
          distribution: 'temurin'
          java-version: '21'
        id: java

      - name: Verify Java installation
        run: |
          java -version
          echo "JAVA_HOME=$JAVA_HOME"
          if ! java -version 2>&1 | grep -q "21"; then
            echo "ERROR: Java 21 is not installed!"
            exit 1
          fi

      - name: Setup Android SDK
        uses: android-actions/setup-android@92770a8d909d43f2e5afdd9b7092a90f2dd85b52 # v3.0.0
        with:
          api-level: 36
          target: default
          arch: x86_64

      - name: Verify Java after Android SDK setup
        run: |
          java -version
          echo "JAVA_HOME=$JAVA_HOME"

      - name: Install dependencies
        run: npm ci

      - name: Build project for E2E
        run: |
          export LANG=en_US.UTF-8
          npm run build:e2e

      - name: Build Android APK
        run: |
          cd android
          export JAVA_HOME="$JAVA_HOME"
          echo "Using JAVA_HOME: $JAVA_HOME"
          java -version
          ./gradlew assembleDebug -Dorg.gradle.java.home="$JAVA_HOME"
          cd ..
          APP_PATH=$(find android/app/build/outputs/apk/debug -name "*.apk" | head -1)
          echo "APP_PATH=$APP_PATH" >> "$GITHUB_ENV"
          echo "Saved APK path: $APP_PATH"

      - name: Start Appium
        run: |
          npm install -g appium
          appium driver install uiautomator2 || appium driver update uiautomator2 || true
          appium &

      - name: Wait for Appium
        run: |
          for i in {1..30}; do
            if curl -s http://127.0.0.1:4723/wd/hub/status > /dev/null 2>&1; then
              echo "Appium is ready"
              exit 0
            fi
            echo "Waiting for Appium... ($i/30)"
            sleep 1
          done
          echo "Appium did not start within 30 seconds"
          exit 1

      - name: Run onboarding-intro E2E test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -no-audio -gpu swiftshader_indirect -no-snapshot-save -no-boot-anim
          disable-animations: true
          script: |
            for i in {1..10}; do curl -s http://127.0.0.1:4723/wd/hub/status && break || sleep 3; done
            npm run wdio:android:s24ultra -- --spec ./tests/features/onboarding/onboarding-intro.feature

      - name: Cleanup
        if: always()
        run: |
          adb emu kill || true
          pkill -f appium || true
